<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electoral Roll</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            padding: 20px;
        }
        .card {
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        {% block content %}
        {% if user.is_authenticated %}
        {% if user.is_authenticated %}
        <nav>
            <a href="{% url 'dashboard' %}" class="btn btn-primary">Dashboard</a>
            <a href="{% url 'search_records' %}" class="btn btn-secondary">Search</a>
            <a href="{% url 'add_record' %}" class="btn btn-success">Add Record</a>
            <a href="{% url 'logout' %}" class="btn btn-danger">Logout</a>
        </nav>
    {% else %}
        <a href="{% url 'login' %}" class="btn btn-primary">Login</a>
    {% endif %}
{% endif %}
        {% endblock %}
    </div>
    {% if messages %}
    {% for message in messages %}
        <div id="flash-message"
             data-icon="{{ message.tags }}"
             data-message="{{ message|escapejs }}">
        </div>
    {% endfor %}
{% endif %}
    
    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const flash = document.getElementById("flash-message");

    if (flash) {
        Swal.fire({
            icon: flash.dataset.icon || "success",
            title: flash.dataset.message,
            timer: 2000,
            showConfirmButton: false
        });
    }
});
</script>
</body>
</html>
